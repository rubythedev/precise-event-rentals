<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Precise Event Rentals</title>
  
  <!-- Embed Josefin Sans Font -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap');
    
    /* Font Classes */
    .josefin-sans-light { font-family: "Josefin Sans", sans-serif; font-weight: 200; font-style: normal; }
    .josefin-sans-regular { font-family: "Josefin Sans", sans-serif; font-weight: 400; font-style: normal; }
    .josefin-sans-bold { font-family: "Josefin Sans", sans-serif; font-weight: 700; font-style: normal; }
    .josefin-sans-italic { font-family: "Josefin Sans", sans-serif; font-weight: 400; font-style: italic; }
    
    /* Navbar Styles */
    .navbar {
      display: flex;
      align-items: center;
      padding: 1rem;
      background-color: #f8f8f8;
    }
    .navbar img.small-logo {
      width: 50px;
      height: auto;
      margin-right: 1rem;
    }
    .navbar .menu {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }
    .navbar .menu li {
      position: relative;
    }
    .navbar .menu li a {
      text-decoration: none;
      font-family: "Josefin Sans", sans-serif;
      font-weight: 400;
      color: #333;
      padding: 0.5rem;
      transition: background-color 0.3s;
    }
    .navbar .menu li a:hover {
      background-color: #ddd;
    }

    /* Dropdown Menu Styles */
    .navbar .menu .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #f8f8f8;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      min-width: 200px;
    }
    .navbar .menu li:hover .dropdown-content {
      display: block;
    }
    .navbar .menu .dropdown-content a {
      font-family: "Josefin Sans", sans-serif;
      font-weight: 400;
      color: #333;
      padding: 0.5rem;
      display: block;
      text-decoration: none;
    }
    .navbar .menu .dropdown-content a:hover {
      background-color: #ddd;
    }
  </style>
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    
<!-- Navbar Section with Relative Paths -->
<header>
  <div class="navbar">
    <img src="images/logos/logonobackground.svg" alt="Logo without background" class="small-logo">
    <nav>
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li>
          <a href="rental_decor.html">Rental Decor</a>
          <div class="dropdown-content">
            <a href="rental_decor/linens.html">Linens</a>
            <a href="rental_decor/event_draping.html">Event Draping</a>
            <a href="rental_decor/napkins.html">Napkins</a>
            <a href="rental_decor/table_runners.html">Table Runners</a>
            <a href="rental_decor/skirting.html">Skirting</a>
            <a href="rental_decor/chairs.html">Chairs</a>
            <a href="rental_decor/vases.html">Vases</a>
            <a href="rental_decor/arches.html">Arches</a>
          </div>
        </li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>
    </nav>
  </div>
</header>

  <!-- Hero Section with Fade-in and White Background -->
  <section id="hero" class="fade-in white-bg">
    <div class="big-logo-container">
        <img src="images/logos/logonobackground.svg" alt="Precise Event Rentals Logo" class="big-logo">
    </div>
    <h2 class="josefin-sans-italic slogan">Creating Unforgettable Moments, Precisely.</h2>
  </section>

  <!-- Image Gallery Section with Fade-in and Light Gray Background -->
  <section id="gallery-preview" class="fade-in light-gray-bg">
    <h3 class="josefin-sans-bold">Our Events</h3>
    <div class="gallery">
      <img src="images/home/image1.png" alt="Event Image 1">
      <img src="images/home/image2.png" alt="Event Image 2">
      <img src="images/home/image3.png" alt="Event Image 3">
      <!-- Add more images as needed -->
    </div>
  </section>

  <!-- Contact Section with Fade-in and White Background -->
  <section id="contact" class="fade-in white-bg">
    <h3 class="josefin-sans-bold">Get in Touch</h3>
    <p class="josefin-sans-regular">Phone: <a href="tel:+1234567890">+1 (234) 567-890</a></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
